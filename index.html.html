<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TB6600 步进电机控制台</title>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<style>
  :root{
    --bg:#23262b;
    --panel:#2e3238;
    --panel-edge:#3c4149;
    --ink:#e8eaed;
    --ink-dim:#9aa1ab;
    --amber:#ffb02e;
    --amber-dim:#8a611e;
    --green:#4cd07d;
    --red:#ff5c5c;
    --mono:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);
    background-image:radial-gradient(circle at 50% -10%, #2c3037 0%, var(--bg) 60%);
    color:var(--ink);
    font-family:system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;
    padding:32px 16px 48px;
  }
  header{width:100%;max-width:520px;margin-bottom:24px;
    border-bottom:1px solid var(--panel-edge);padding-bottom:14px;
    display:flex;justify-content:space-between;align-items:baseline}
  header h1{font-size:17px;font-weight:600;letter-spacing:.04em}
  header .tag{font-family:var(--mono);font-size:11px;color:var(--ink-dim)}

  .card{
    width:100%;max-width:520px;background:var(--panel);
    border:1px solid var(--panel-edge);border-radius:10px;
    padding:20px;margin-bottom:18px;
    box-shadow:0 4px 14px rgba(0,0,0,.25);
  }
  .card h2{font-family:var(--mono);font-size:11px;font-weight:500;
    letter-spacing:.14em;color:var(--ink-dim);text-transform:uppercase;
    margin-bottom:14px}

  label{display:block;font-size:12px;color:var(--ink-dim);margin:10px 0 4px}
  input{
    width:100%;background:#1c1f23;border:1px solid var(--panel-edge);
    border-radius:6px;color:var(--ink);padding:10px 12px;
    font-family:var(--mono);font-size:13px;outline:none;
  }
  input:focus{border-color:var(--amber)}

  .btn{
    display:inline-flex;align-items:center;justify-content:center;
    border:none;border-radius:6px;cursor:pointer;
    font-size:14px;font-weight:600;padding:11px 18px;
    transition:filter .15s, background .15s;
  }
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn:hover:not(:disabled){filter:brightness(1.12)}
  .btn-amber{background:var(--amber);color:#1c1f23;width:100%;margin-top:16px}

  /* 连接状态灯 */
  .conn-row{display:flex;align-items:center;gap:8px;margin-top:14px;
    font-family:var(--mono);font-size:12px;color:var(--ink-dim)}
  .lamp{width:9px;height:9px;border-radius:50%;background:#555;flex-shrink:0}
  .lamp.on{background:var(--green);box-shadow:0 0 8px var(--green)}
  .lamp.err{background:var(--red);box-shadow:0 0 8px var(--red)}

  /* 控制面板:未连接时置灰不可点 */
  .controls{opacity:.45;pointer-events:none;transition:opacity .2s}
  .controls.active{opacity:1;pointer-events:auto}

  .rotor-wrap{display:flex;justify-content:center;margin:6px 0 20px}
  .rotor{width:110px;height:110px}
  .rotor circle{fill:none;stroke:var(--panel-edge);stroke-width:6}
  .rotor .arc{stroke:var(--amber);stroke-dasharray:70 260;stroke-linecap:round;
    transform-origin:center}
  @keyframes spinCW  {from{transform:rotate(0)}to{transform:rotate(360deg)}}
  @keyframes spinCCW {from{transform:rotate(0)}to{transform:rotate(-360deg)}}
  .rotor.run.cw  .arc{animation:spinCW  1.1s linear infinite}
  .rotor.run.ccw .arc{animation:spinCCW 1.1s linear infinite}
  .rotor:not(.run) .arc{stroke:var(--amber-dim)}
  .rotor text{fill:var(--ink);font-family:var(--mono);font-size:15px;
    text-anchor:middle;dominant-baseline:central}

  .row{display:flex;align-items:center;justify-content:space-between;
    padding:14px 0;border-top:1px solid var(--panel-edge)}
  .row .name{font-size:14px}
  .row .hint{font-family:var(--mono);font-size:11px;color:var(--ink-dim);margin-top:2px}

  /* 方向开关 */
  .dir-switch{display:flex;background:#1c1f23;border:1px solid var(--panel-edge);
    border-radius:6px;overflow:hidden}
  .dir-switch button{
    border:none;background:transparent;color:var(--ink-dim);
    font-family:var(--mono);font-size:13px;padding:9px 18px;cursor:pointer;
  }
  .dir-switch button.sel{background:var(--amber);color:#1c1f23;font-weight:700}

  /* 启停按钮 */
  .run-btn{width:100%;margin-top:16px;padding:16px;font-size:16px;
    letter-spacing:.08em;border-radius:8px}
  .run-btn.start{background:var(--green);color:#12241a}
  .run-btn.stop{background:var(--red);color:#2a1212}

  .log{font-family:var(--mono);font-size:11px;color:var(--ink-dim);
    margin-top:14px;max-height:90px;overflow-y:auto;line-height:1.7;
    border-top:1px solid var(--panel-edge);padding-top:8px}
</style>
</head>
<body>

<header>
  <h1>TB6600 步进电机控制台</h1>
  <span class="tag">ESP32 · MQTT · wss:8884</span>
</header>

<!-- 连接卡片 -->
<div class="card">
  <h2>Broker 连接 — HiveMQ Cloud</h2>
  <label for="url">WebSocket URL</label>
  <input id="url" placeholder="wss://xxxxxxxx.s1.eu.hivemq.cloud:8884/mqtt">
  <label for="user">用户名</label>
  <input id="user" placeholder="MQTT 用户名" autocomplete="off">
  <label for="pass">密码</label>
  <input id="pass" type="password" placeholder="MQTT 密码" autocomplete="off">
  <button id="connBtn" class="btn btn-amber">连接</button>
  <div class="conn-row"><span id="lamp" class="lamp"></span><span id="connText">未连接</span></div>
</div>

<!-- 控制卡片 -->
<div class="card controls" id="panel">
  <h2>电机控制</h2>

  <div class="rotor-wrap">
    <svg class="rotor" id="rotor" viewBox="0 0 120 120">
      <circle cx="60" cy="60" r="48"></circle>
      <circle class="arc" cx="60" cy="60" r="48"></circle>
      <text x="60" y="60" id="rotorText">停止</text>
    </svg>
  </div>

  <div class="row">
    <div>
      <div class="name">旋转方向</div>
      <div class="hint">DIR+ → GPIO18</div>
    </div>
    <div class="dir-switch">
      <button id="cwBtn" class="sel">CW 正转</button>
      <button id="ccwBtn">CCW 反转</button>
    </div>
  </div>

  <button id="runBtn" class="btn run-btn start">启 动</button>

  <div class="log" id="log"></div>
</div>

<script>
const TOPIC_DIR = "stepper/cmd/dir";
const TOPIC_RUN = "stepper/cmd/run";
const TOPIC_STATUS = "stepper/status";

let client = null;
let running = false;
let dirCW = true;

const $ = id => document.getElementById(id);
const lamp = $("lamp"), connText = $("connText"), connBtn = $("connBtn");
const panel = $("panel"), rotor = $("rotor"), rotorText = $("rotorText");
const runBtn = $("runBtn"), cwBtn = $("cwBtn"), ccwBtn = $("ccwBtn");

function log(msg){
  const el = $("log");
  const t = new Date().toLocaleTimeString();
  el.innerHTML = `[${t}] ${msg}<br>` + el.innerHTML;
}

function renderUI(){
  // 方向开关
  cwBtn.classList.toggle("sel", dirCW);
  ccwBtn.classList.toggle("sel", !dirCW);
  // 启停按钮
  runBtn.textContent = running ? "停 止" : "启 动";
  runBtn.className = "btn run-btn " + (running ? "stop" : "start");
  // 转子动画
  rotor.classList.toggle("run", running);
  rotor.classList.toggle("cw", dirCW);
  rotor.classList.toggle("ccw", !dirCW);
  rotorText.textContent = running ? (dirCW ? "CW" : "CCW") : "停止";
}

// ---- 连接 ----
connBtn.addEventListener("click", () => {
  if (client) { client.end(true); return; }

  const url = $("url").value.trim();
  if (!url.startsWith("wss://")) { alert("URL 需要以 wss:// 开头,例如\nwss://xxxx.s1.eu.hivemq.cloud:8884/mqtt"); return; }

  connText.textContent = "连接中…";
  lamp.className = "lamp";
  connBtn.disabled = true;

  client = mqtt.connect(url, {
    username: $("user").value.trim(),
    password: $("pass").value,
    clientId: "web-panel-" + Math.random().toString(16).slice(2, 8),
    clean: true,
    reconnectPeriod: 4000,
    connectTimeout: 8000,
  });

  client.on("connect", () => {
    connBtn.disabled = false;
    connBtn.textContent = "断开连接";
    lamp.className = "lamp on";
    connText.textContent = "已连接";
    panel.classList.add("active");
    client.subscribe(TOPIC_STATUS);
    log("已连接 broker,订阅 " + TOPIC_STATUS);
  });

  client.on("message", (topic, payload) => {
    if (topic !== TOPIC_STATUS) return;
    try {
      const s = JSON.parse(payload.toString());
      running = !!s.running;
      dirCW = s.dir === "CW";
      renderUI();
      log("ESP32 状态: " + payload.toString());
    } catch(e){ log("状态解析失败: " + payload.toString()); }
  });

  client.on("error", err => {
    lamp.className = "lamp err";
    connText.textContent = "错误: " + err.message;
    log("连接错误: " + err.message);
    connBtn.disabled = false;
  });

  client.on("close", () => {
    lamp.className = "lamp";
    connText.textContent = "未连接";
    connBtn.textContent = "连接";
    connBtn.disabled = false;
    panel.classList.remove("active");
    client = null;
  });
});

// ---- 控制 ----
function publish(topic, msg){
  if (!client || !client.connected) { alert("请先连接 MQTT"); return; }
  client.publish(topic, msg);
  log(`发送 [${topic}] ${msg}`);
}

cwBtn.addEventListener("click", () => publish(TOPIC_DIR, "CW"));
ccwBtn.addEventListener("click", () => publish(TOPIC_DIR, "CCW"));
runBtn.addEventListener("click", () => publish(TOPIC_RUN, running ? "STOP" : "START"));

renderUI();
</script>
</body>
</html>
